name: Salesforce CI/CD  🚀

on:
  create:

  push:
    branches:
      - 'feature/QADIR/**'

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      - 'feature/QADIR/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env_name:   ${{ steps.setenv.outputs.env_name }}
      test_level: ${{ steps.setenv.outputs.test_level }}

    steps:
      - id: setenv
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi

          echo "Branch detected: $BRANCH"

          if [[ "$BRANCH" == feature/QADIR/* || "$BRANCH" == "develop" ]]; then
            echo "env_name=QA"              >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/uat/* ]]; then
            echo "env_name=UAT"             >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/preprod/* ]]; then
            echo "env_name=PREPROD"         >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/prod/* ]]; then
            echo "env_name=PROD"            >> $GITHUB_OUTPUT
            echo "test_level=RunAllTestsInOrg" >> $GITHUB_OUTPUT

          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

  validate-qa:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: |
      (github.event_name == 'create' && startsWith(github.ref, 'refs/heads/feature/QADIR/')) ||
      (github.event_name == 'push'   && startsWith(github.ref, 'refs/heads/feature/QADIR/')) ||
      (github.event_name == 'pull_request' && github.event.action != 'closed' &&
        startsWith(github.head_ref, 'feature/') && github.base_ref == 'develop') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true &&
        startsWith(github.head_ref, 'feature/') && github.base_ref == 'develop')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🐒
        run: |
          echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_QA }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_QA }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Validate QA 🐥
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 30

  deploy-qa:
    runs-on: ubuntu-latest
    needs: [setup, validate-qa]
    environment: env
    if: |
      needs.validate-qa.result == 'success' &&
      (
        (github.event_name == 'create' && startsWith(github.ref, 'refs/heads/feature/QADIR/')) ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true &&
          startsWith(github.head_ref, 'feature/') && github.base_ref == 'develop')
      )

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🐒
        run: |
          echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_QA }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_QA }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Deploy QA 🦧
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30

  validate-uat:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: |
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/uat/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🐒
        run: |
          echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_UAT }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_UAT }}" \
            --instance-url https://test.salesforce.com \
            --set-default

      - name: Validate UAT 🐥
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 30


  deploy-uat:
    runs-on: ubuntu-latest
    needs: [setup, validate-uat]
    environment: env
    if: |
      needs.validate-uat.result == 'success' &&
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/uat/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🦒
        run: |
          echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_UAT }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_UAT }}" \
            --instance-url https://test.salesforce.com \
            --set-default

      - name: Deploy UAT 🐸
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30

  validate-preprod:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: |
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/preprod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🗿
        run: |
          echo "${{ secrets.SF_JWT_KEY_PREPROD }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_PREPROD }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_PREPROD }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Validate PreProd ⚠️
        run: |
          sf project deploy validate \
            --manifest manifest/packageDIR.xml \
            --test-level RunLocalTests \
            --wait 30

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: [setup, validate-preprod]
    environment: env
    if: |
      needs.validate-preprod.result == 'success' &&
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/preprod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate 🗿
        run: |
          echo "${{ secrets.SF_JWT_KEY_PREPROD }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_PREPROD }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_PREPROD }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Deploy PreProd ⚠️
        run: |
          sf project deploy start \
            --manifest manifest/packageDIR.xml \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30


  validate-prod:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: |
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/prod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          echo "${{ secrets.SF_JWT_KEY_PROD }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_PROD }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_PROD }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Validate Prod 🔴
        run: |
          sf project deploy validate \
            --manifest manifest/package.xml \
            --test-level RunAllTestsInOrg \
            --wait 30

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [setup, validate-prod]
    environment: env
    if: |
      needs.validate-prod.result == 'success' &&
      github.event_name == 'create' &&
      startsWith(github.ref, 'refs/heads/release/prod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          echo "${{ secrets.SF_JWT_KEY_PROD }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_PROD }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_PROD }}" \
            --instance-url https://login.salesforce.com \
            --set-default

      - name: Deploy Prod 🔴
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --test-level RunAllTestsInOrg \
            --wait 30
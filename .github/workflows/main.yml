name: Salesforce CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - 'feature/QADIR/**'
      - 'release/**'
      - 'release/preprod/**'
      - 'release/prod/**'

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      - uat
      - preprod
      - main
      - 'feature/QADIR/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env_name }}
      test_level: ${{ steps.setenv.outputs.test_level }}

    steps:
      - id: setenv
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/feature/QADIR/* ]]; then
            echo "env_name=QA" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF}" == refs/heads/feature/* ]]; then
            echo "env_name=QA" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF}" == refs/heads/release/preprod/* ]]; then
            echo "env_name=PREPROD" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF}" == refs/heads/release/prod/* ]]; then
            echo "env_name=PROD" >> $GITHUB_OUTPUT
            echo "test_level=RunAllTestsInOrg" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            echo "env_name=UAT" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT
          fi

  auth:
    runs-on: ubuntu-latest
    needs: setup
    environment: env

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Prepare Auth
        run: |
          ENV="${{ needs.setup.outputs.env_name }}"

          if [[ "$ENV" == "QA" ]]; then
            echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key
            echo "SF_USERNAME=${{ secrets.SF_USERNAME_QA }}" >> $GITHUB_ENV
            echo "SF_CLIENT_ID=${{ secrets.SF_CLIENT_ID_QA }}" >> $GITHUB_ENV
            echo "SF_INSTANCE_URL=https://login.salesforce.com" >> $GITHUB_ENV

          elif [[ "$ENV" == "UAT" ]]; then
            echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key
            echo "SF_USERNAME=${{ secrets.SF_USERNAME_UAT }}" >> $GITHUB_ENV
            echo "SF_CLIENT_ID=${{ secrets.SF_CLIENT_ID_UAT }}" >> $GITHUB_ENV
            echo "SF_INSTANCE_URL=https://test.salesforce.com" >> $GITHUB_ENV

          elif [[ "$ENV" == "PREPROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PREPROD }}" > server.key
            echo "SF_USERNAME=${{ secrets.SF_USERNAME_PREPROD }}" >> $GITHUB_ENV
            echo "SF_CLIENT_ID=${{ secrets.SF_CLIENT_ID_PREPROD }}" >> $GITHUB_ENV
            echo "SF_INSTANCE_URL=https://login.salesforce.com" >> $GITHUB_ENV

          elif [[ "$ENV" == "PROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PROD }}" > server.key
            echo "SF_USERNAME=${{ secrets.SF_USERNAME_PROD }}" >> $GITHUB_ENV
            echo "SF_CLIENT_ID=${{ secrets.SF_CLIENT_ID_PROD }}" >> $GITHUB_ENV
            echo "SF_INSTANCE_URL=https://login.salesforce.com" >> $GITHUB_ENV
          fi

      - name: Authenticate
        run: |
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "$SF_INSTANCE_URL" \
            --set-default

  validate-push:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Deployment
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

  deploy-feature-create:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/QADIR/')

    steps:
      - uses: actions/checkout@v4

      - name: Detect First Commit
        id: check
        run: |
          if [ "$(git rev-list --count HEAD)" -eq 1 ]; then
            echo "first=true" >> $GITHUB_OUTPUT
          else
            echo "first=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Initial Feature
        if: steps.check.outputs.first == 'true'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level NoTestRun \
            --ignore-conflicts \
            --wait 30

  validate-pr:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Validate PR
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

  deploy-after-merge:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - name: Validate Again
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --ignore-conflicts \
            --wait 30

  deploy-qa:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event.pull_request.merged == true &&
        startsWith(github.head_ref, 'feature/') &&
        startsWith(github.base_ref, 'feature/QADIR/')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to QA
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30

  deploy-release:
    runs-on: ubuntu-latest
    needs: [setup, auth]
    environment: env
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')

    steps:
      - uses: actions/checkout@v4

      - name: Validate Release
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

      - name: Deploy Release
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --ignore-conflicts \
            --wait 30

name: Salesforce CI/CD  🚀

on:
  push:
    branches:
      - 'feature/**'
      - 'feature/QADIR/**'
      - 'release/preprod/**'
      - 'release/prod/**'

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      - main
      - 'feature/QADIR/**'
      - 'release/uat/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env_name }}
      test_level: ${{ steps.setenv.outputs.test_level }}

    steps:
      - id: setenv
        run: |
          # Determine correct branch
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi

          echo "Branch detected: $BRANCH"

          if [[ "$BRANCH" == feature/QADIR/* ]]; then
            echo "env_name=QA" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == feature/* ]]; then
            echo "env_name=QA" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/preprod/* ]]; then
            echo "env_name=PREPROD" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/prod/* ]]; then
            echo "env_name=PROD" >> $GITHUB_OUTPUT
            echo "test_level=RunAllTestsInOrg" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/* ]]; then
            echo "env_name=UAT" >> $GITHUB_OUTPUT
            echo "test_level=RunLocalTests" >> $GITHUB_OUTPUT

          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

  validate-push:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          ENV="${{ needs.setup.outputs.env_name }}"

          if [[ "$ENV" == "QA" ]]; then
            echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key
            USER=${{ secrets.SF_USERNAME_QA }}
            CLIENT=${{ secrets.SF_CLIENT_ID_QA }}
            URL=https://login.salesforce.com

          elif [[ "$ENV" == "UAT" ]]; then
            echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key
            USER=${{ secrets.SF_USERNAME_UAT }}
            CLIENT=${{ secrets.SF_CLIENT_ID_UAT }}
            URL=https://test.salesforce.com

          elif [[ "$ENV" == "PREPROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PREPROD }}" > server.key
            USER=${{ secrets.SF_USERNAME_PREPROD }}
            CLIENT=${{ secrets.SF_CLIENT_ID_PREPROD }}
            URL=https://login.salesforce.com

          elif [[ "$ENV" == "PROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PROD }}" > server.key
            USER=${{ secrets.SF_USERNAME_PROD }}
            CLIENT=${{ secrets.SF_CLIENT_ID_PROD }}
            URL=https://login.salesforce.com
          fi

          sf org login jwt \
            --client-id "$CLIENT" \
            --jwt-key-file server.key \
            --username "$USER" \
            --instance-url "$URL" \
            --set-default

      - name: Validate Deployment 🦥
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30


  validate-pr:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          ENV="${{ needs.setup.outputs.env_name }}"

          if [[ "$ENV" == "QA" ]]; then
            echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key
            USER=${{ secrets.SF_USERNAME_QA }}
            CLIENT=${{ secrets.SF_CLIENT_ID_QA }}
            URL=https://login.salesforce.com
          else
            echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key
            USER=${{ secrets.SF_USERNAME_UAT }}
            CLIENT=${{ secrets.SF_CLIENT_ID_UAT }}
            URL=https://test.salesforce.com
          fi

          sf org login jwt \
            --client-id "$CLIENT" \
            --jwt-key-file server.key \
            --username "$USER" \
            --instance-url "$URL" \
            --set-default

      - name: Validate PR 🐥
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30


  deploy-QA:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event.pull_request.merged == true &&
        startsWith(github.head_ref, 'feature/') &&
        startsWith(github.base_ref, 'feature/QADIR/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          echo "${{ secrets.SF_JWT_KEY_QA }}" > server.key

          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_QA }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_QA }}" \
            --instance-url https://test.salesforce.com \
            --set-default

      - name: Deploy to QA 🦧
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30
            

  deploy-UAT:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event.pull_request.merged == true &&
        startsWith(github.base_ref, 'release/uat')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          echo "${{ secrets.SF_JWT_KEY_UAT }}" > server.key

          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID_UAT }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME_UAT }}" \
            --instance-url https://test.salesforce.com \
            --set-default

      - name: Deploy to UAT 🐸
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --ignore-conflicts \
            --wait 30


  deploy-release-PreProd:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/preprod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          ENV="${{ needs.setup.outputs.env_name }}"

          if [[ "$ENV" == "PREPROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PREPROD }}" > server.key
            USER=${{ secrets.SF_USERNAME_PREPROD }}
            CLIENT=${{ secrets.SF_CLIENT_ID_PREPROD }}
            URL=https://test.salesforce.com
          fi

          sf org login jwt \
            --client-id "$CLIENT" \
            --jwt-key-file server.key \
            --username "$USER" \
            --instance-url "$URL" \
            --set-default

      - name: Validate Release PreProd ⚠️
        run: |
          sf project deploy validate \
            --manifest manifest/packageDIR.xml \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

      - name: Deploy Release to PreProd ⚠️
        run: |
          sf project deploy start \
            --manifest manifest/packageDIR.xml \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --ignore-conflicts \
            --wait 30


  deploy-release-PROD:
    runs-on: ubuntu-latest
    needs: setup
    environment: env
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/prod/')

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate
        run: |
          ENV="${{ needs.setup.outputs.env_name }}"

          if [[ "$ENV" == "PROD" ]]; then
            echo "${{ secrets.SF_JWT_KEY_PROD }}" > server.key
            USER=${{ secrets.SF_USERNAME_PROD }}
            CLIENT=${{ secrets.SF_CLIENT_ID_PROD }}
            URL=https://login.salesforce.com
          fi

          sf org login jwt \
            --client-id "$CLIENT" \
            --jwt-key-file server.key \
            --username "$USER" \
            --instance-url "$URL" \
            --set-default

      - name: Validate Release to PROD 🔴
        run: |
          sf project deploy validate \
            --manifest manifest/package.xml \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30

      - name: Deploy Release to PROD 🔴
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --test-level "${{ needs.setup.outputs.test_level }}" \
            --wait 30
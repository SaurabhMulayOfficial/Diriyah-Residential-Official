<template>
    <lightning-card title="User Status" icon-name="utility:user">

        <div class="main-box">

            <div class="section-title">
                User Current Status
            </div>

            <div class="status-box">

                <div class="status-text">
                    {currentStatus}
                </div>

                <div class="dropdown-box">
                    <lightning-combobox
                        value={currentStatus}
                        options={statusOptions}
                        onchange={handleStatusChange}
                        variant="label-hidden"
                        disabled={isLoading}>
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner
                size="small"
                alternative-text="Loading">
            </lightning-spinner>
        </template>

    </lightning-card>
</template>
